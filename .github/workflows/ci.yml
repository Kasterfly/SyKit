name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
            node: "22.12.0"
          - os: ubuntu-latest
            python: "3.12"
            node: "24"
          - os: ubuntu-latest
            python: "3.13"
            node: "22.12.0"
          - os: ubuntu-latest
            python: "3.14"
            node: "24"
          - os: windows-latest
            python: "3.11"
            node: "22.12.0"
          - os: windows-latest
            python: "3.14"
            node: "24"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: requirements.lock
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: files/frontend-build/package-lock.json
      - name: Install locked Python dependencies
        run: python -m pip install --require-hashes -r requirements.lock
      - name: Check installed dependencies
        run: python -m pip check
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Run quick-start smoke test
        run: python tests/smoke_quickstart.py

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install locked development dependencies
        run: python -m pip install --require-hashes -r requirements-dev.lock
      - name: Measure branch coverage
        run: |
          python -m coverage run -m unittest discover -s tests
          python -m coverage report

  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: files/frontend-build/package-lock.json
      - name: Install locked development dependencies
        run: python -m pip install --require-hashes -r requirements-dev.lock
      - name: Install Chromium
        run: python -m playwright install --with-deps chromium
      - name: Run browser-to-server suite
        run: python tests/e2e_quickstart.py

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: files/frontend-build/package-lock.json
      - name: Install locked runtime dependencies
        run: python -m pip install --require-hashes -r requirements.lock
      - name: Build quick-start application
        run: |
          python . init
          python -c "import json; p='src/sykit/config.json'; v=json.load(open(p)); v.update({'docker': True, 'host-ip': '0.0.0.0'}); open(p, 'w').write(json.dumps(v))"
          python . build
      - name: Build and start generated image
        run: |
          docker build -t sykit-generated:ci built
          docker run -d --name sykit-generated-ci -p 18000:8000 -e SYKIT_SESSION_SECRET=ci-only-secret-that-is-longer-than-32-bytes sykit-generated:ci
          trap 'docker rm -f sykit-generated-ci >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:18000/healthz && break
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18000/healthz
          test "$(docker exec sykit-generated-ci id -u)" != "0"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
      - name: Audit Python dependencies
        run: |
          python -m pip install --require-hashes -r requirements-dev.lock
          python -m pip_audit -r requirements.lock
      - name: Audit frontend dependencies
        working-directory: files/frontend-build
        run: npm audit --package-lock-only --omit=dev

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install locked development tools
        run: python -m pip install --require-hashes -r requirements-dev.lock
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
