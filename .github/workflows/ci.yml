name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
            node: "20.19.0"
          - os: ubuntu-latest
            python: "3.14"
            node: "24"
          - os: windows-latest
            python: "3.10"
            node: "20.19.0"
          - os: windows-latest
            python: "3.14"
            node: "24"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: files/frontend-build/package-lock.json
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Check installed dependencies
        run: python -m pip check
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Run quick-start smoke test
        run: python tests/smoke_quickstart.py

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
      - name: Audit Python dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip_audit -r requirements.txt
      - name: Audit frontend dependencies
        working-directory: files/frontend-build
        run: npm audit --package-lock-only --omit=dev

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install development tools
        run: python -m pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
