name: Feature request
description: Propose a focused SyKit capability
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the application problem, not only the desired API.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: compatibility
    attributes:
      label: Compatibility impact
      options:
        - Additive
        - Changes existing behavior
        - Unknown
    validations:
      required: true
